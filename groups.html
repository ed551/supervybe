<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Supervybe - Groups</title>
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Group-specific styling (can be moved to style.css later if desired) */
        .group-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 10px;
        }
        .group-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 10px var(--shadow-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.2s ease;
        }
        .group-card:hover {
            transform: scale(1.02);
        }
        .group-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-grow: 1;
        }
        .group-icon {
            font-size: 2.5rem;
        }
        .group-details h3 {
            font-size: 1.1rem;
            margin-bottom: 5px;
        }
        .group-details p {
            font-size: 0.85rem;
            opacity: 0.8;
        }
        .group-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: flex-end;
        }
        .btn-icon {
            background: var(--accent-color);
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            color: #000;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 2px 5px var(--shadow-light);
            transition: background 0.3s;
        }
        .btn-manage {
            background: #ff4757; /* distinct color for admin management */
            color: #fff;
        }
    </style>
</head>
<body>

    <main id="supervybe-main-content">
        
        <section class="feed-header">
            <h2>👥 Hubs</h2>
        </section>

        <section id="group-list-container" class="group-container">
            
            <div class="group-card">
                <div class="group-info">
                    <div class="group-icon">📈</div>
                    <div class="group-details">
                        <h3>Gold Traders</h3>
                        <p>Market insights & predictions</p>
                    </div>
                </div>
                <div class="group-actions">
                    <button class="btn-icon" title="Join/Leave">✔️</button>
                    <button class="btn-icon btn-manage hidden" title="Manage Group">⚙️</button>
                </div>
            </div>

            <div class="group-card">
                <div class="group-info">
                    <div class="group-icon">🎮</div>
                    <div class="group-details">
                        <h3>Gamers Lounge</h3>
                        <p>Tournaments & streaming</p>
                    </div>
                </div>
                <div class="group-actions">
                    <button class="btn-icon" title="Join/Leave">➕</button>
                </div>
            </div>

            </section>

        <div class="admob-container" id="admob-window" style="display:none;">
            <iframe src="ads.html" width="100%" height="60" frameborder="0" scrolling="no"></iframe>
        </div>

    </main>

    <script src="theme_engine.js"></script>
    <script src="HeaderIntelligence.js"></script>

    <script src="script.js"></script>

    <script src="elastic_db_manager.js"></script>
    <script src="communication_bridge.js"></script>

    <script src="groups.js"></script>

</body>
</html>
