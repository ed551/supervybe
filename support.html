<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Supervybe - Customer Support</title>
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Support-specific styling */
        .support-header {
            margin-bottom: 15px;
        }

        /* Direct Contact Form */
        .contact-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px var(--shadow-light);
        }
        .contact-card h3 {
            margin-bottom: 15px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .contact-input {
            width: 100%;
            background: var(--bg-color);
            border: 1px solid var(--shadow-light);
            color: var(--text-color);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            font-size: 1rem;
            outline: none;
        }
        .contact-textarea {
            resize: none;
            height: 100px;
        }
        .btn-send-support {
            width: 100%;
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(245, 176, 65, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        /* PDF Viewer Container */
        .pdf-container {
            width: 100%;
            height: 50vh; /* Scaled to leave room for the contact form */
            background-color: var(--card-bg);
            border: 1px solid var(--shadow-light);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px var(--shadow-light);
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }
        .pdf-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .pdf-fallback {
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
        }
        .btn-download {
            background: var(--accent-color);
            color: #000;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 15px;
            display: inline-block;
            box-shadow: 0 2px 5px var(--shadow-light);
        }
    </style>
</head>
<body>

    <main id="supervybe-main-content">
        
        <section class="feed-header support-header">
            <h2>🎧 Help & Support</h2>
        </section>

        <section class="contact-card" id="support-contact-form">
            <h3>✉️ Direct Message</h3>
            <p style="font-size: 0.85rem; opacity: 0.8; margin-bottom: 15px;">Send a report directly to the Supervybe admin team.</p>
            
            <input type="text" id="support-subject" class="contact-input" placeholder="Subject...">
            <textarea id="support-message" class="contact-input contact-textarea" placeholder="How can we help you today?"></textarea>
            
            <button class="btn-send-support" id="btn-submit-support">
                <span>Send Message</span> 🚀
            </button>
        </section>

        <section class="pdf-container" id="support-document-viewer">
            <iframe src="asset/support.pdf" title="Supervybe Support Guide" id="pdf-iframe">
                <div class="pdf-fallback">
                    <span style="font-size: 3rem;">📄</span>
                    <p style="margin-top: 10px;">Your device browser cannot display the support PDF directly.</p>
                    <a href="asset/support.pdf" class="btn-download" download>Download Support Guide</a>
                </div>
            </iframe>
        </section>

        <div class="admob-container" id="admob-window" style="display:none;">
            <iframe src="ads.html" width="100%" height="60" frameborder="0" scrolling="no"></iframe>
        </div>

    </main>

    <script src="theme_engine.js"></script>
    <script src="HeaderIntelligence.js"></script>

    <script src="script.js"></script>

    <script src="privacy_engine.js"></script>
    <script src="auto_translation_engine.js"></script>
    <script src="email_system_reporter.js"></script>

    <script src="support.js"></script>

</body>
</html>
